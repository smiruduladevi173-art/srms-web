<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>SRMS Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:#F8FAFC;
overflow:hidden;
}

/* =========================
   MAIN LAYOUT
========================= */

.container{
display:flex;
height:100vh;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{

width:280px;

background:linear-gradient(
180deg,
#2563EB 0%,
#1D4ED8 100%
);

padding:25px;

display:flex;

flex-direction:column;

box-shadow:
4px 0 20px rgba(0,0,0,.08);
}

/* =========================
   LOGO
========================= */

.logo{

text-align:center;

margin-bottom:40px;
}

.logo h2{

font-size:28px;

font-weight:700;

color:white;

letter-spacing:.5px;
}

.logo p{

color:rgba(255,255,255,.8);

font-size:13px;

margin-top:5px;
}

/* =========================
   MENU
========================= */

.menu{

display:flex;

flex-direction:column;

gap:10px;

flex:1;
}

.sidebar a{

display:flex;

align-items:center;

gap:12px;

padding:15px 18px;

border-radius:14px;

text-decoration:none;

font-size:15px;

font-weight:600;

color:rgba(255,255,255,.88);

transition:
all .25s ease;
}

/* Hover */

.sidebar a:hover{

background:
rgba(255,255,255,.12);

color:white;

transform:
translateX(4px);
}

/* Active */

.sidebar a.active{

background:white;

color:#2563EB;

box-shadow:
0 10px 25px rgba(0,0,0,.12);

position:relative;
}

.sidebar a.active::before{

content:"";

position:absolute;

left:-25px;

top:10px;

bottom:10px;

width:5px;

background:white;

border-radius:10px;
}

/* =========================
   LOGOUT
========================= */

.logout{

margin-top:auto;

background:
rgb(220, 38, 38);

color:white !important;
}

.logout:hover{

background:#DC2626;

transform:none;
}

/* =========================
   CONTENT
========================= */

.content{

flex:1;

padding:30px;

overflow:auto;

background:#F8FAFC;
}

/* =========================
   CARD
========================= */

.card{

background:white;

min-height:100%;

padding:35px;

border-radius:24px;

border:1px solid #E2E8F0;

box-shadow:
0 12px 35px rgba(15,23,42,.06);

animation:
fadeIn .25s ease;
}

/* =========================
   PAGE ANIMATION
========================= */

@keyframes fadeIn{

from{

opacity:0;

transform:
translateY(10px);

}

to{

opacity:1;

transform:
translateY(0);

}
}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{

background:#CBD5E1;

border-radius:20px;
}

::-webkit-scrollbar-track{
background:transparent;
}

</style>

</head>

<body>

<div class="container">

<!-- =========================
     SIDEBAR
========================= -->

<div class="sidebar">

<div class="logo">

<h2>🎓 STUDENT</h2>

<p>DASHBOARD</p>


</div>

<div class="menu">

<a

th:href="@{/student/student-dashboard(view='profile')}"

th:classappend="${activePage == 'profile'} ? 'active'">

👤 Profile

</a>

<a

th:href="@{/student/student-dashboard(view='marks')}"

th:classappend="${activePage == 'marks'} ? 'active'">

📚 Marks

</a>

<a

th:href="@{/student/student-dashboard(view='performance')}"

th:classappend="${activePage == 'performance'} ? 'active'">

📊 Performance

</a>

</div>

<a

class="logout"

th:href="@{/logout}">

🚪 Logout

</a>

</div>

<!-- =========================
     CONTENT
========================= -->

<div class="content">

<div class="card">

<div

th:if="${view!=null}"

th:replace="~{${view}}">

</div>

<div th:if="${view==null}">

<h2>

Dashboard Loaded

</h2>

<p>

Select an option from sidebar

</p>

</div>

</div>

</div>

</div>

</body>

</html>
