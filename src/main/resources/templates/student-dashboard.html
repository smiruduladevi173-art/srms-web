<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>SRMS Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #F1F5F9;
      overflow: hidden;
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: #0F172A;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      flex-shrink: 0;
    }

    .sidebar-logo {
      padding: 0 8px;
      margin-bottom: 32px;
    }

    .sidebar-logo-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .sidebar-icon-box {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #185FA5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
    }

    .sidebar-brand {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.04em;
    }

    .sidebar-divider {
      height: 1px;
      background: rgba(255,255,255,.08);
      margin-top: 16px;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,.3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 10px;
      margin-bottom: 6px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,.55);
      transition: background .15s, color .15s;
    }

    .sidebar-nav a:hover {
      background: rgba(255,255,255,.07);
      color: #fff;
    }

    .sidebar-nav a.active {
      background: rgba(255,255,255,.1);
      color: #fff;
    }

    .sidebar-nav a.active i {
      color: #60A5FA;
    }

    .sidebar-nav a i { font-size: 17px; }

    .sidebar-footer {
      border-top: 1px solid rgba(255,255,255,.08);
      padding-top: 16px;
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,.5);
      transition: background .15s, color .15s;
    }

    .logout-btn:hover {
      background: rgba(220,38,38,.15);
      color: #FCA5A5;
    }

    .logout-btn i { font-size: 16px; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid #E2E8F0;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 17px;
      font-weight: 500;
      color: #0F172A;
      margin: 0;
    }

    .topbar-sub {
      font-size: 12px;
      color: #64748B;
      margin: 0;
    }

    .badge-year {
      background: #E6F1FB;
      color: #185FA5;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .content-scroll {
      flex: 1;
      overflow: auto;
      padding: 24px 28px;
    }

    .content-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 32px;
      min-height: calc(100% - 10px);
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 300px;
      color: #64748B;
    }

    .empty-icon-box {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #F1F5F9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #94A3B8;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 20px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-top">
        <div class="sidebar-icon-box"><i class="ti ti-school"></i></div>
        <span class="sidebar-brand">SRMS</span>
      </div>
      <div class="sidebar-divider"></div>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-label">Menu</span>

      <a th:href="@{/student/student-dashboard(view='profile')}"
         th:classappend="${activePage == 'profile'} ? ' active'">
        <i class="ti ti-user-circle"></i> Profile
      </a>

      <a th:href="@{/student/student-dashboard(view='marks')}"
         th:classappend="${activePage == 'marks'} ? ' active'">
        <i class="ti ti-book-2"></i> Marks
      </a>

      <a th:href="@{/student/student-dashboard(view='performance')}"
         th:classappend="${activePage == 'performance'} ? ' active'">
        <i class="ti ti-chart-bar"></i> Performance
      </a>
    </nav>

    <div class="sidebar-footer">
      <a class="logout-btn" th:href="@{/logout}">
        <i class="ti ti-logout"></i> Sign out
      </a>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div>
        <h1 class="topbar-title"
            th:text="${activePage != null} ? ${#strings.capitalize(activePage)} : 'Dashboard'">
          Dashboard
        </h1>
        <p class="topbar-sub">Your academic record</p>
      </div>
      <span class="badge-year">2024–25</span>
    </div>

    <div class="content-scroll">
      <div class="content-card">
        <div th:if="${view != null}" th:replace="~{${view}}"></div>

        <div th:if="${view == null}" class="empty-state">
          <div class="empty-icon-box"><i class="ti ti-layout-dashboard"></i></div>
          <p style="font-size:15px; font-weight:500; color:#0F172A; margin:0;">Select a section</p>
          <p style="font-size:13px; margin:0;">Choose an option from the sidebar to get started</p>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
