<div class="an-page">

  <div class="an-header">
    <h2 class="an-title">Analytics</h2>
    <p class="an-subtitle"
       th:text="${summary != null ? 'Performance overview for the selected department' : 'Select a department to generate a performance report'}">
      Select a department to generate a performance report
    </p>
  </div>

  <form th:action="@{/staff/analytics}" method="get" class="an-filter">
    <select name="departmentId" class="an-select">
      <option value="0">Select department</option>
      <option th:each="dep : ${departments}"
              th:value="${dep.id}"
              th:text="${dep.departmentName}"
              th:selected="${dep.id == departmentId}"></option>
    </select>
    <button type="submit" class="an-btn an-btn--primary">
      <i class="ti ti-chart-bar"></i> Generate report
    </button>
  </form>

  <div th:if="${summary == null}" class="an-empty">
    <i class="ti ti-chart-bar"></i>
    <p>Select a department above to generate a performance report</p>
  </div>

  <div th:if="${summary != null}">

    <h3 class="an-section-title">Performance summary</h3>

    <div class="an-grid">

      <div class="an-box">
        <div class="an-box-label"><i class="ti ti-users"></i> Total students</div>
        <div class="an-box-value" th:text="${summary.totalStudents}">0</div>
      </div>

      <div class="an-box">
        <div class="an-box-label"><i class="ti ti-calculator"></i> Average marks</div>
        <div class="an-box-value" th:text="${#numbers.formatDecimal(summary.averageMarks,1,2)}">0.00</div>
      </div>

      <div class="an-box">
        <div class="an-box-label"><i class="ti ti-trophy"></i> Highest mark</div>
        <div class="an-box-value" th:text="${summary.highestMark}">0</div>
      </div>

      <div class="an-box an-box--warn">
        <div class="an-box-label"><i class="ti ti-trending-down"></i> Lowest mark</div>
        <div class="an-box-value" th:text="${summary.lowestMark}">0</div>
      </div>

      <div class="an-box"
           th:classappend="${summary.passPercentage >= 50 ? 'an-box--good' : 'an-box--warn'}">
        <div class="an-box-label"><i class="ti ti-circle-check"></i> Pass percentage</div>
        <div class="an-box-value" th:text="${#numbers.formatDecimal(summary.passPercentage,1,2) + '%'}">0%</div>
      </div>

    </div>

    <h3 class="an-section-title">Top performers</h3>

    <div class="an-leaderboard">
      <div class="an-row" th:each="student, stat : ${topStudents}">

        <span class="an-rank"
              th:classappend="${stat.count == 1 ? 'an-rank--gold' : (stat.count == 2 ? 'an-rank--silver' : (stat.count == 3 ? 'an-rank--bronze' : ''))}"
              th:text="${stat.count}">1</span>

        <div class="an-info">
          <div class="an-name" th:text="${student.studentName}">Student name</div>
          <div class="an-label">Overall average</div>
        </div>

        <span class="an-score" th:text="${#numbers.formatDecimal(student.average,1,2)}">95.00</span>

      </div>
    </div>

  </div>

</div>

<style>
  .an-page {
    --an-text: #0F172A;
    --an-muted: #64748B;
    --an-faint: #94A3B8;
    --an-border: #E2E8F0;
    --an-surface: #F8FAFC;
    --an-accent: #0F6E56;
    --an-accent-soft: #E1F5EE;
    --an-warn: #B45309;
    --an-gold-bg: #FEF3C7;
    --an-gold-text: #92400E;
    --an-silver-bg: #E2E8F0;
    --an-silver-text: #475569;
    --an-bronze-bg: #FFE4D1;
    --an-bronze-text: #9A3412;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--an-text);
  }

  .an-header { margin-bottom: 20px; }
  .an-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .an-subtitle { font-size: 13px; color: var(--an-muted); }

  /* Filter */
  .an-filter { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }

  .an-select {
    min-width: 220px;
    padding: 10px 14px;
    font: inherit;
    font-size: 14px;
    color: var(--an-text);
    background: #fff;
    border: 1px solid var(--an-border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }

  .an-select:hover { border-color: #CBD5E1; }

  .an-select:focus {
    outline: none;
    border-color: var(--an-accent);
    box-shadow: 0 0 0 3px rgba(15,110,86,.12);
  }

  .an-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
  }

  .an-btn i { font-size: 15px; }
  .an-btn:focus-visible { outline: 2px solid var(--an-accent); outline-offset: 2px; }
  .an-btn--primary { background: var(--an-accent); color: #fff; }
  .an-btn--primary:hover { background: #0C5C48; }

  /* Empty state */
  .an-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 48px 0;
    color: var(--an-muted);
  }

  .an-empty i { font-size: 28px; color: var(--an-faint); }
  .an-empty p { font-size: 13px; }

  /* Section titles */
  .an-section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--an-text);
    margin: 24px 0 12px;
  }

  .an-section-title:first-of-type { margin-top: 0; }

  /* Summary grid */
  .an-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 14px;
  }

  .an-box {
    background: #fff;
    border: 1px solid var(--an-border);
    border-radius: 12px;
    padding: 16px 18px;
    transition: border-color .15s;
  }

  .an-box:hover { border-color: #CBD5E1; }

  .an-box-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--an-muted);
  }

  .an-box-label i { font-size: 14px; color: var(--an-faint); }

  .an-box-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--an-text);
    margin-top: 8px;
  }

  .an-box--warn .an-box-value { color: var(--an-warn); }
  .an-box--good .an-box-value { color: var(--an-accent); }

  /* Leaderboard */
  .an-leaderboard {
    border: 1px solid var(--an-border);
    border-radius: 14px;
    overflow: hidden;
  }

  .an-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--an-surface);
    transition: background .15s;
  }

  .an-row:last-child { border-bottom: none; }
  .an-row:hover { background: #FAFBFD; }

  .an-rank {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    border-radius: 999px;
    background: var(--an-surface);
    color: var(--an-muted);
  }

  .an-rank--gold   { background: var(--an-gold-bg);   color: var(--an-gold-text); }
  .an-rank--silver { background: var(--an-silver-bg); color: var(--an-silver-text); }
  .an-rank--bronze { background: var(--an-bronze-bg); color: var(--an-bronze-text); }

  .an-info { flex: 1; min-width: 0; }
  .an-name { font-size: 14px; font-weight: 600; color: var(--an-text); }
  .an-label { font-size: 12px; color: var(--an-muted); margin-top: 2px; }

  .an-score {
    flex-shrink: 0;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 700;
    color: var(--an-accent);
    background: var(--an-accent-soft);
    border-radius: 999px;
    min-width: 64px;
    text-align: center;
  }

  @media (max-width: 720px) {
    .an-select { min-width: 100%; }
    .an-filter { flex-direction: column; align-items: stretch; }
    .an-row { flex-wrap: wrap; }
  }
</style>
