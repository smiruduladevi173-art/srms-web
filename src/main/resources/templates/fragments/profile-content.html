<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Student Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #F1F5F9;
    }

    .profile-wrapper {
      padding: 28px;
      display: flex;
      justify-content: center;
    }

    .profile-card {
      width: 100%;
      max-width: 600px;
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      overflow: hidden;
    }

    /* Header */
    .profile-header {
      background: #0F172A;
      padding: 36px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
    }

    .profile-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #185FA5, #1D9E75);
    }

    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      border: 1.5px solid rgba(255,255,255,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 28px;
      color: rgba(255,255,255,.8);
    }

    .profile-label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0 0 4px;
    }

    .profile-name {
      font-size: 20px;
      font-weight: 500;
      color: #fff;
      margin: 0 0 3px;
    }

    .profile-dept {
      font-size: 13px;
      color: rgba(255,255,255,.5);
      margin: 0;
    }

    /* Fields */
    .info-body {
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
    }

    .info-row {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #F1F5F9;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-key {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 180px;
      flex-shrink: 0;
    }

    .info-key i {
      font-size: 16px;
      color: #94A3B8;
    }

    .info-key span {
      font-size: 13px;
      color: #64748B;
    }

    .info-value {
      font-size: 14px;
      font-weight: 500;
      color: #0F172A;
    }

    /* Footer */
    .profile-footer {
      padding: 14px 28px;
      background: #F8FAFC;
      border-top: 1px solid #E2E8F0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .profile-footer i {
      font-size: 15px;
      color: #1D9E75;
    }

    .profile-footer span {
      font-size: 12px;
      color: #64748B;
    }

    @media (max-width: 640px) {
      .profile-wrapper { padding: 16px; }
      .profile-header { flex-direction: column; text-align: center; }
      .info-key { width: 150px; }
    }
  </style>
</head>
<body>

<div class="profile-wrapper">
  <div class="profile-card">

    <!-- Header -->
    <div class="profile-header">
      <div class="profile-avatar">
        <i class="ti ti-user"></i>
      </div>
      <div>
        <p class="profile-label">Student Profile</p>
        <h2 class="profile-name" th:text="${name}">Student Name</h2>
        <p class="profile-dept" th:text="${department}">Department</p>
      </div>
    </div>

    <!-- Fields -->
    <div class="info-body">

      <div class="info-row">
        <div class="info-key">
          <i class="ti ti-id-badge"></i>
          <span>Roll number</span>
        </div>
        <span class="info-value" th:text="${rollNumber}"></span>
      </div>

      <div class="info-row">
        <div class="info-key">
          <i class="ti ti-calendar"></i>
          <span>Date of birth</span>
        </div>
        <span class="info-value" th:text="${dob}"></span>
      </div>

      <div class="info-row">
        <div class="info-key">
          <i class="ti ti-gender-bigender"></i>
          <span>Gender</span>
        </div>
        <span class="info-value" th:text="${gender}"></span>
      </div>

      <div class="info-row">
        <div class="info-key">
          <i class="ti ti-building"></i>
          <span>Department</span>
        </div>
        <span class="info-value" th:text="${department}"></span>
      </div>

    </div>

    <!-- Footer -->
    <div class="profile-footer">
      <i class="ti ti-circle-check"></i>
      <span>Academic record verified</span>
    </div>

  </div>
</div>

</body>
</html>
