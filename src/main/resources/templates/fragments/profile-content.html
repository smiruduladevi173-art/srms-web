<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Student Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#F8FAFC;
}

/* =========================
   WRAPPER
========================= */

.profile-wrapper{

    display:flex;

    justify-content:center;

    padding:30px;
}

/* =========================
   MAIN CARD
========================= */

.profile-card{

    width:650px;

    background:white;

    border-radius:20px;

    overflow:hidden;

    border:1px solid #E2E8F0;

    box-shadow:
    0 8px 24px rgba(15,23,42,.08);

    transition:.3s ease;
}

.profile-card:hover{

    transform:translateY(-4px);

    box-shadow:
    0 15px 35px rgba(15,23,42,.12);
}

/* =========================
   HEADER
========================= */

.profile-header{

    background:
    linear-gradient(
    135deg,
    #2563EB,
    #3B82F6
    );

    text-align:center;

    padding:45px 30px;

    color:white;
}

.profile-icon{

    width:100px;

    height:100px;

    margin:auto;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:48px;

    border-radius:50%;

    background:
    rgba(255,255,255,.15);

    backdrop-filter:blur(10px);

    margin-bottom:18px;
}

.profile-name{

    font-size:30px;

    font-weight:700;

    letter-spacing:.5px;
}

.profile-department{

    margin-top:8px;

    font-size:16px;

    opacity:.9;
}

/* =========================
   INFO SECTION
========================= */

.info-section{

    padding:30px;
}

/* =========================
   INFO ITEM
========================= */

.info-item{

    padding:20px;

    border:1px solid #E2E8F0;

    border-radius:14px;

    margin-bottom:15px;

    transition:.3s ease;

    background:white;
}

.info-item:hover{

    border-color:#BFDBFE;

    background:#F8FBFF;

    transform:translateX(4px);
}

.info-top{

    display:flex;

    align-items:center;

    gap:10px;

    margin-bottom:8px;
}

.info-icon{

    font-size:20px;
}

.info-label{

    font-size:14px;

    font-weight:600;

    color:#64748B;

    text-transform:uppercase;

    letter-spacing:.5px;
}

.info-value{

    margin-left:30px;

    font-size:18px;

    font-weight:600;

    color:#0F172A;
}

/* =========================
   FOOTER
========================= */

.profile-footer{

    text-align:center;

    padding:20px;

    border-top:1px solid #E2E8F0;

    color:#10B981;

    font-weight:600;

    background:#FAFAFA;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

    .profile-card{
        width:100%;
    }

    .profile-name{
        font-size:24px;
    }

}

</style>

</head>

<body>

<div class="profile-wrapper">

<div class="profile-card">

    <!-- HEADER -->

    <div class="profile-header">

        <div class="profile-icon">
            🎓
        </div>

        <div
            class="profile-name"
            th:text="${name}">
            Student Name
        </div>

        <div
            class="profile-department"
            th:text="${department}">
            Department
        </div>

    </div>

    <!-- INFO SECTION -->

    <div class="info-section">

        <!-- Roll Number -->

        <div class="info-item">

            <div class="info-top">

                <span class="info-icon">👤</span>

                <span class="info-label">
                    Roll Number
                </span>

            </div>

            <div
                class="info-value"
                th:text="${rollNumber}">
            </div>

        </div>

        <!-- DOB -->

        <div class="info-item">

            <div class="info-top">

                <span class="info-icon">🎂</span>

                <span class="info-label">
                    Date Of Birth
                </span>

            </div>

            <div
                class="info-value"
                th:text="${dob}">
            </div>

        </div>

        <!-- Gender -->

        <div class="info-item">

            <div class="info-top">

                <span class="info-icon">⚧</span>

                <span class="info-label">
                    Gender
                </span>

            </div>

            <div
                class="info-value"
                th:text="${gender}">
            </div>

        </div>

        <!-- Department -->

        <div class="info-item">

            <div class="info-top">

                <span class="info-icon">🏢</span>

                <span class="info-label">
                    Department
                </span>

            </div>

            <div
                class="info-value"
                th:text="${department}">
            </div>

        </div>

    </div>

    <!-- FOOTER -->


</div>

</div>

</body>
</html>
