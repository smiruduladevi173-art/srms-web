<div class="admin-card">

<div class="student-layout">

    <!-- LEFT -->
    <div class="student-form">

        <h2>🎓 Add Student</h2>

        <form
                th:action="@{/admin/students/add}"
                method="post">

            <input
                    type="text"
                    name="rollNumber"
                    placeholder="Roll Number"
                    required>

            <input
                    type="text"
                    name="name"
                    placeholder="Student Name"
                    required>

            <input
                    type="date"
                    name="dob"
                    required>

            <select
                    name="departmentId"
                    required>

                <option value="">
                    Select Department
                </option>

                <option
                        th:each="dept:${departments}"
                        th:value="${dept.id}"
                        th:text="${dept.departmentName}">
                </option>

            </select>

            <select
                    name="gender"
                    required>

                <option value="">
                    Select Gender
                </option>

                <option value="Female">
                    Female
                </option>

                <option value="Male">
                    Male
                </option>

            </select>

            <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required>

            <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

            <button type="submit">
                Add Student
            </button>

        </form>

        <div
                th:if="${message}"
                class="success-msg"
                th:text="${message}">
        </div>

        <div
                th:if="${error}"
                class="error-msg"
                th:text="${error}">
        </div>

    </div>

    <!-- RIGHT -->
    <div class="student-table">

        <div class="table-header">

            <h2>
                Student Records
            </h2>

            <div class="search-bar">

                <form
                        th:action="@{/admin/students/search}"
                        method="post">

                    <input
                            type="text"
                            name="search"
                            placeholder="Search Roll No / Name"
                            th:value="${search}">

                    <button>
                        Search
                    </button>

                </form>

            </div>

        </div>

        <table>

            <thead>

            <tr>

                <th>Roll No</th>
                <th>Name</th>
                <th>DOB</th>
                <th>Gender</th>
                <th>Department</th>
                <th>Action</th>

            </tr>

            </thead>

            <tbody>

            <tr
                    th:each="student:${students}">

                <td th:text="${student.rollNumber}">
                </td>

                <td th:text="${student.name}">
                </td>

                <td th:text="${student.dob}">
                </td>

                <td>

                    <span
                            class="gender-badge"
                            th:text="${student.gender}">
                    </span>

                </td>

                <td th:text="${student.department}">
                </td>

                <td>

                    <form
                            th:action="@{/admin/students/delete}"
                            method="post"
                            onsubmit="return confirm('Delete student?')">

                        <input
                                type="hidden"
                                name="studentId"
                                th:value="${student.studentId}">

                        <button class="delete-btn">

                            Delete

                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</div>

<style>

.student-layout{
    display:grid;
    grid-template-columns:370px 1fr;
    gap:25px;
}

/* LEFT CARD */

.student-form{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 4px 20px rgba(0,0,0,.05);
}

.student-form h2{
    margin-bottom:25px;
    color:#0F172A;
}

.student-form form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.student-form input,
.student-form select{

    padding:14px;
    border:1px solid #CBD5E1;
    border-radius:12px;
    background:#F8FAFC;
    transition:.2s;

}

.student-form input:focus,
.student-form select:focus{

    outline:none;
    border-color:#2563EB;
    background:white;

}

.student-form button{

    background:#2563EB;
    color:white;
    border:none;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:.2s;

}

.student-form button:hover{

    background:#1D4ED8;

}


/* RIGHT CARD */

.student-table{

    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 4px 20px rgba(0,0,0,.05);

}

.table-header{

    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;

}

.table-header h2{

    color:#0F172A;

}


/* SEARCH */

.search-bar form{

    display:flex;
    gap:12px;

}

.search-bar input{

    width:280px;
    padding:14px;
    border:1px solid #CBD5E1;
    border-radius:12px;
    background:#F8FAFC;

}

.search-bar button{

    background:#2563EB;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:12px;
    cursor:pointer;

}


/* TABLE */

table{

    width:100%;
    border-collapse:collapse;

}

thead{

    background:#F8FAFC;

}

th{

    padding:16px;
    text-align:left;
    color:#64748B;

}

td{

    padding:18px 16px;
    border-bottom:1px solid #E2E8F0;
    color:#0F172A;

}

tbody tr{

    transition:.2s;

}

tbody tr:hover{

    background:#F8FAFC;

}


/* BADGE */

.gender-badge{

    background:#DBEAFE;
    color:#2563EB;
    padding:7px 14px;
    border-radius:30px;
    font-size:13px;
    font-weight:600;

}


/* DELETE */

.delete-btn{

    background:#EF4444;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;

}

.delete-btn:hover{

    background:#DC2626;

}


/* MESSAGES */

.success-msg{

    margin-top:20px;
    background:#ECFDF5;
    color:#10B981;
    padding:14px;
    border-radius:12px;

}

.error-msg{

    margin-top:20px;
    background:#FEF2F2;
    color:#EF4444;
    padding:14px;
    border-radius:12px;

}


/* RESPONSIVE */

@media(max-width:1100px){

    .student-layout{

        grid-template-columns:1fr;

    }

    .table-header{

        flex-direction:column;
        gap:20px;
        align-items:flex-start;

    }

}

</style>
