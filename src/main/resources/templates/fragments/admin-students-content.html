<style>
  .sl { display: grid; grid-template-columns: 340px 1fr; gap: 20px; align-items: start; }

  .card {
    background: var(--color-background-primary, #fff);
    border: 0.5px solid var(--color-border-tertiary, #E2E8F0);
    border-radius: 12px;
    padding: 24px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--color-text-primary, #0F172A);
    margin: 0 0 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title i { font-size: 18px; color: #6D28D9; }

  .field-row { display: flex; flex-direction: column; gap: 4px; }

  .field-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }

  .field-label {
    font-size: 12px;
    color: var(--color-text-secondary, #64748B);
  }

  .fi {
    width: 100%;
    padding: 9px 12px;
    border: 0.5px solid var(--color-border-tertiary, #E2E8F0);
    border-radius: 8px;
    background: var(--color-background-secondary, #F8FAFC);
    font-size: 13px;
    color: var(--color-text-primary, #0F172A);
    transition: border-color .15s, background .15s;
  }

  .fi:focus {
    outline: none;
    border-color: #6D28D9;
    background: var(--color-background-primary, #fff);
  }

  .btn-primary {
    width: 100%;
    padding: 10px;
    border: none;
    background: #6D28D9;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-primary:hover { background: #5B21B6; }

  .msg-ok {
    margin-top: 12px;
    background: #ECFDF5;
    color: #065F46;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 0.5px solid #A7F3D0;
  }

  .msg-err {
    margin-top: 12px;
    background: #FEF2F2;
    color: #991B1B;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 0.5px solid #FECACA;
  }

  .th-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    gap: 12px;
  }

  .search-wrap { display: flex; gap: 8px; }

  .search-wrap input {
    padding: 8px 12px;
    border: 0.5px solid var(--color-border-tertiary, #E2E8F0);
    border-radius: 8px;
    background: var(--color-background-secondary, #F8FAFC);
    font-size: 13px;
    color: var(--color-text-primary, #0F172A);
    width: 220px;
  }

  .search-wrap button {
    padding: 8px 14px;
    background: #6D28D9;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .student-table-inner { width: 100%; border-collapse: collapse; font-size: 13px; }

  .student-table-inner thead tr {
    border-bottom: 0.5px solid var(--color-border-tertiary, #E2E8F0);
  }

  .student-table-inner th {
    padding: 8px 10px;
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    color: var(--color-text-secondary, #64748B);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .student-table-inner td {
    padding: 12px 10px;
    color: var(--color-text-primary, #0F172A);
    border-bottom: 0.5px solid var(--color-border-tertiary, #E2E8F0);
  }

  .student-table-inner tbody tr:last-child td { border-bottom: none; }

  .student-table-inner tbody tr:hover td {
    background: var(--color-background-secondary, #F8FAFC);
  }

  .gender-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }

  .gender-badge-male  { background: #EDE9FE; color: #5B21B6; }
  .gender-badge-female{ background: #FCE7F3; color: #9D174D; }

  .delete-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    background: #FEF2F2;
    color: #991B1B;
    border: 0.5px solid #FECACA;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: background .15s;
  }

  .delete-btn:hover { background: #FEE2E2; }

  @media (max-width: 1000px) {
    .sl { grid-template-columns: 1fr; }
    .th-row { flex-direction: column; align-items: flex-start; }
  }
</style>

<div class="sl">

  <!-- LEFT: Add Student Form -->
  <div class="card">
    <p class="card-title">
      <i class="ti ti-user-plus" aria-hidden="true"></i> Add student
    </p>

    <form th:action="@{/admin/students/add}" method="post">
      <div class="field-group">

        <div class="field-row">
          <span class="field-label">Roll number</span>
          <input class="fi" type="text" name="rollNumber" placeholder="e.g. CS2024001" required>
        </div>

        <div class="field-row">
          <span class="field-label">Full name</span>
          <input class="fi" type="text" name="name" placeholder="Student name" required>
        </div>

        <div class="field-row">
          <span class="field-label">Date of birth</span>
          <input class="fi" type="date" name="dob" required>
        </div>

        <div class="field-row">
          <span class="field-label">Department</span>
          <select class="fi" name="departmentId" required>
            <option value="">Select department</option>
            <option
              th:each="dept : ${departments}"
              th:value="${dept.id}"
              th:text="${dept.departmentName}">
            </option>
          </select>
        </div>

        <div class="field-row">
          <span class="field-label">Gender</span>
          <select class="fi" name="gender" required>
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>

        <div class="field-row">
          <span class="field-label">Username</span>
          <input class="fi" type="text" name="username" placeholder="Login username" required>
        </div>

        <div class="field-row">
          <span class="field-label">Password</span>
          <input class="fi" type="password" name="password" placeholder="••••••••" required>
        </div>

      </div>

      <button class="btn-primary" type="submit">
        <i class="ti ti-plus" aria-hidden="true"></i> Add student
      </button>
    </form>

    <div th:if="${message}" class="msg-ok"  th:text="${message}"></div>
    <div th:if="${error}"   class="msg-err" th:text="${error}"></div>
  </div>

  <!-- RIGHT: Student Table -->
  <div class="card">
    <div class="th-row">
      <p class="card-title" style="margin: 0;">
        <i class="ti ti-users" aria-hidden="true"></i> Student records
      </p>
      <div class="search-wrap">
        <form th:action="@{/admin/students/search}" method="post" style="display:flex;gap:8px;">
          <input type="text" name="search" placeholder="Roll no / name" th:value="${search}">
          <button type="submit">
            <i class="ti ti-search" aria-hidden="true"></i> Search
          </button>
        </form>
      </div>
    </div>

    <table class="student-table-inner">
      <thead>
        <tr>
          <th>Roll no</th>
          <th>Name</th>
          <th>DOB</th>
          <th>Gender</th>
          <th>Department</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="student : ${students}">
          <td th:text="${student.rollNumber}"></td>
          <td th:text="${student.name}"></td>
          <td th:text="${student.dob}"></td>
          <td>
            <span class="gender-badge"
              th:classappend="${student.gender == 'Male'} ? 'gender-badge-male' : 'gender-badge-female'"
              th:text="${student.gender}">
            </span>
          </td>
          <td th:text="${student.department}"></td>
          <td>
            <form
              th:action="@{/admin/students/delete}"
              method="post"
              onsubmit="return confirm('Delete this student?')">
              <input type="hidden" name="studentId" th:value="${student.studentId}">
              <button class="delete-btn" type="submit">
                <i class="ti ti-trash" aria-hidden="true"></i> Delete
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
