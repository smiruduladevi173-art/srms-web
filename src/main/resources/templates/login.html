<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRMS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-color: #F0F4FF;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(59,130,246,0.10) 0%, transparent 55%);
    font-family: 'Inter', sans-serif;
  }
  .card {
    width: 100%;
    max-width: 440px;
    background: #ffffff;
    border-radius: 20px;
    padding: 48px 44px 40px;
    border: 1px solid rgba(99,102,241,0.12);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 32px rgba(99,102,241,0.08), 0 24px 64px rgba(0,0,0,0.06);
  }
  .brand {
    display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
  }
  .brand-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, #4F46E5, #6366F1);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .brand-icon svg {
    width: 20px; height: 20px; fill: none; stroke: #fff;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  .brand-text { line-height: 1.2; }
  .brand-name {
    font-size: 13px; font-weight: 700; color: #1E1B4B;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .brand-sub { font-size: 11px; color: #8B8FA8; letter-spacing: 0.02em; }
  .heading {
    font-size: 24px; font-weight: 700; color: #0F0E2A;
    letter-spacing: -0.02em; margin-bottom: 6px;
  }
  .subheading {
    font-size: 14px; color: #6B7280; margin-bottom: 32px; line-height: 1.5;
  }
  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(99,102,241,0.15), transparent);
    margin-bottom: 28px;
  }
  .form-group { margin-bottom: 18px; }
  label {
    display: block; font-size: 13px; font-weight: 600;
    color: #374151; margin-bottom: 7px; letter-spacing: 0.01em;
  }
  .input-wrap { position: relative; }
  input[type="text"], input[type="password"] {
    width: 100%; padding: 12px 14px; font-size: 14px;
    font-family: 'Inter', sans-serif; color: #111827;
    background: #F9FAFB; border: 1.5px solid #E5E7EB;
    border-radius: 10px; outline: none;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: #6366F1; background: #fff;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
  }
  input::placeholder { color: #B0B5C3; }
  .toggle-eye {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    padding: 4px; color: #9CA3AF;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; transition: color 0.15s, background 0.15s;
    width: auto;
  }
  .toggle-eye:hover {
    color: #6366F1; background: rgba(99,102,241,0.08);
    transform: translateY(-50%);
  }
  .toggle-eye svg {
    width: 16px; height: 16px; stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  input.has-toggle { padding-right: 42px; }
  .btn-signin {
    width: 100%; padding: 13px; margin-top: 8px; border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #4F46E5 0%, #6366F1 100%);
    color: #fff; font-size: 15px; font-weight: 600;
    font-family: 'Inter', sans-serif; cursor: pointer;
    letter-spacing: 0.01em;
    transition: opacity 0.18s, transform 0.15s, box-shadow 0.18s;
    box-shadow: 0 4px 14px rgba(99,102,241,0.30);
  }
  .btn-signin:hover {
    opacity: 0.93; transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(99,102,241,0.38);
  }
  .btn-signin:active { transform: translateY(0); opacity: 1; }
  .error-box {
    display: flex; align-items: center; gap: 8px;
    margin-top: 14px; padding: 11px 14px;
    background: #FEF2F2; border: 1px solid #FECACA;
    border-radius: 9px; color: #B91C1C;
    font-size: 13px; font-weight: 500;
    animation: slideIn 0.25s ease;
  }
  .error-box svg {
    width: 15px; height: 15px; stroke: #EF4444; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .footer {
    margin-top: 28px; text-align: center;
    font-size: 12px; color: #C4C7D1; letter-spacing: 0.01em;
  }
  .footer span { color: #6366F1; font-weight: 600; }
</style>
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="brand-text">
      <div class="brand-name">SRMS</div>
      <div class="brand-sub">Academic Portal</div>
    </div>
  </div>

  <div class="heading">Welcome back</div>
  <div class="subheading">Sign in to access the Student Record Management System.</div>

  <div class="divider"></div>

  <form th:action="@{/login}" method="post">

    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <input
          id="username"
          type="text"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          required>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input
          id="password"
          type="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          class="has-toggle"
          required>
        <button
          type="button"
          class="toggle-eye"
          id="toggleBtn"
          aria-label="Show password"
          onclick="togglePassword()">
          <svg id="iconEye" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="iconEyeOff" viewBox="0 0 24 24" style="display:none;">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-signin">Sign In</button>

    <div
      id="errorBox"
      class="error-box"
      th:if="${error}">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span th:text="${error}">Invalid credentials.</span>
    </div>

  </form>

  <div class="footer">
    &copy; 2025 &nbsp;<span>SRMS</span>&nbsp; &middot; All rights reserved
  </div>

</div>

<script>
  function togglePassword() {
    const input  = document.getElementById('password');
    const btn    = document.getElementById('toggleBtn');
    const eye    = document.getElementById('iconEye');
    const eyeOff = document.getElementById('iconEyeOff');

    if (input.type === 'password') {
      input.type = 'text';
      eye.style.display    = 'none';
      eyeOff.style.display = 'block';
      btn.setAttribute('aria-label', 'Hide password');
    } else {
      input.type = 'password';
      eye.style.display    = 'block';
      eyeOff.style.display = 'none';
      btn.setAttribute('aria-label', 'Show password');
    }
  }

  setTimeout(() => {
    const box = document.getElementById('errorBox');
    if (box) {
      box.style.transition = 'opacity 0.4s';
      box.style.opacity = '0';
      setTimeout(() => box.style.display = 'none', 400);
    }
  }, 5000);
</script>

</body>
</html>
