
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>SRMS Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

background:
linear-gradient(
135deg,
#F8FAFC,
#EFF6FF,
#DBEAFE,
#BFDBFE,
#DBEAFE,
#EFF6FF,
#F8FAFC
);

background-size:
500% 500%;

animation:
aurora 18s ease infinite;
}

@keyframes aurora{

0%{
background-position:0% 50%;
}

25%{
background-position:50% 100%;
}

50%{
background-position:100% 50%;
}

75%{
background-position:50% 0%;
}

100%{
background-position:0% 50%;
}

}

.login-card{

width:100%;
max-width:480px;

background:white;

padding:45px;

border-radius:24px;

box-shadow:
0 20px 40px rgba(0,0,0,.08);

border:1px solid #E2E8F0;
}

.logo{

font-size:80px;

text-align:center;

margin-bottom:10px;
}

.title{

text-align:center;

font-size:28px;

font-weight:700;

color:#0F172A;

line-height:1.3;

margin-bottom:8px;
}

.subtitle{

text-align:center;

font-size:15px;

color:#64748B;

margin-bottom:35px;
}

.form-group{

margin-bottom:20px;
}

label{

display:block;

margin-bottom:8px;

font-size:14px;

font-weight:600;

color:#334155;
}

input{

width:100%;

padding:14px 16px;

font-size:15px;

border:1px solid #CBD5E1;

border-radius:12px;

outline:none;

transition:.2s;
}

input:focus{

border-color:#2563EB;

box-shadow:
0 0 0 4px rgba(37,99,235,.12);
}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:
linear-gradient(
135deg,
#2563EB,
#1D4ED8
);

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.2s;
}

button:hover{

transform:translateY(-1px);
}

.error{

margin-top:15px;

padding:12px;

background:#FEF2F2;

border:1px solid #FECACA;

color:#DC2626;

border-radius:10px;

font-size:14px;

font-weight:600;

text-align:center;

animation:fadeIn .3s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(-5px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.footer{

margin-top:30px;

text-align:center;

font-size:13px;

color:#94A3B8;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">
🎓
</div>

<div class="title">
Student Record<br>
Management System
</div>

<div class="subtitle">
Secure Login Portal
</div>

<form th:action="@{/login}" method="post">

<div class="form-group">

<label>Username</label>

<input
type="text"
name="username"
placeholder="Enter your username"
required>

</div>

<div class="form-group">

<label>Password</label>

<input
type="password"
name="password"
placeholder="Enter your password"
required>

</div>

<button type="submit">

Sign In

</button>

<div
id="errorBox"
class="error"
th:if="${error}"
th:text="${error}">
</div>
</form>

</div>

<script>

setTimeout(() => {

    const errorBox =
        document.getElementById(
            "errorBox"
        );

    if(errorBox){

        errorBox.style.display =
            "none";

    }

}, 5000);

</script>

</body>

</html>
